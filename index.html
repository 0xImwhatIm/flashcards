<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Cards ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #fff9f0;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 14px 12px 30px;
  overflow-x: hidden; position: relative;
}
.bubble {
  position: fixed; border-radius: 50%; opacity: 0.10;
  animation: floatUp linear infinite; pointer-events: none;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0deg); }
  100% { transform: translateY(-20vh) rotate(360deg); }
}
/* Phase selector */
#phase-selector { display:flex; gap:10px; margin:12px 0 8px; z-index:10; position:relative; }
.phase-btn {
  font-family:'Fredoka One',cursive; font-size:0.95rem;
  border:3px solid transparent; border-radius:50px;
  padding:0.5rem 1.4rem; cursor:pointer;
  transition:all 0.2s; box-shadow:0 4px 0 rgba(0,0,0,.15);
}
.phase-btn.p1 { background:#ff6b6b; color:#fff; }
.phase-btn.p2 { background:#fff; color:#7b5ea7; border-color:#7b5ea7; }
.phase-btn.active.p1 { box-shadow:0 0 0 3px #ffd166; }
.phase-btn.active.p2 { background:#7b5ea7; color:#fff; box-shadow:0 0 0 3px #c8b0e8; }
/* Title */
#main-title {
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.3rem,4vw,2rem); color:#ff6b6b;
  text-align:center; text-shadow:3px 3px 0 #ffd166;
  z-index:10; position:relative; margin-bottom:4px;
}
/* Progress */
#progress-track {
  width:min(92vw,460px); height:9px; background:#e0d5c5;
  border-radius:10px; overflow:hidden; z-index:10; position:relative; margin-bottom:5px;
}
#progress-bar { height:100%; background:linear-gradient(90deg,#ff6b6b,#ffd166); border-radius:10px; transition:width 0.4s ease; }
#counter { font-family:'Fredoka One',cursive; font-size:0.95rem; color:#aaa; margin-bottom:8px; z-index:10; position:relative; }
/* Card */
#stage { perspective:1200px; z-index:10; position:relative; width:min(92vw,460px); margin-bottom:10px; }
#card { width:100%; position:relative; border-radius:28px; transition:transform 0.32s cubic-bezier(.4,0,.2,1); cursor:pointer; }
#card.flipping { transform:rotateY(90deg) scale(0.95); }
.card-face {
  border-radius:28px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  box-shadow:0 12px 36px rgba(0,0,0,.14);
  padding:14px 14px 12px; gap:5px; position:relative;
  min-height:min(52vw,270px); user-select:none;
}
.card-illus { line-height:0; }
.card-illus svg { border-radius:14px; display:block; }
.card-word { font-family:'Fredoka One',cursive; font-size:clamp(1.7rem,5.5vw,2.8rem); text-align:center; line-height:1.1; color:#fff; text-shadow:2px 3px 0 rgba(0,0,0,.18); }
.card-phonetic { font-size:clamp(0.8rem,2.3vw,1rem); color:rgba(255,255,255,.9); font-weight:700; font-style:italic; }
.card-category { font-size:0.78rem; font-weight:700; color:rgba(255,255,255,.75); background:rgba(0,0,0,.12); padding:2px 12px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }
.sound-wave { position:absolute; bottom:10px; right:12px; display:flex; gap:3px; align-items:flex-end; height:18px; opacity:0; transition:opacity .3s; }
.sound-wave.active { opacity:1; }
.sound-wave span { display:block; width:3px; border-radius:2px; background:rgba(255,255,255,.85); animation:waveBar .6s ease infinite alternate; }
.sound-wave span:nth-child(1){height:7px;animation-delay:0s}
.sound-wave span:nth-child(2){height:14px;animation-delay:.1s}
.sound-wave span:nth-child(3){height:10px;animation-delay:.2s}
.sound-wave span:nth-child(4){height:18px;animation-delay:.05s}
.sound-wave span:nth-child(5){height:9px;animation-delay:.15s}
@keyframes waveBar { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }
.theme-face      { background:linear-gradient(135deg,#ff9a9e,#fad0c4); }
.theme-hair      { background:linear-gradient(135deg,#a18cd1,#fbc2eb); }
.theme-accessor  { background:linear-gradient(135deg,#ffecd2,#fcb69f); }
.theme-landmark  { background:linear-gradient(135deg,#84fab0,#8fd3f4); }
.theme-transport { background:linear-gradient(135deg,#a1c4fd,#c2e9fb); }
.theme-time      { background:linear-gradient(135deg,#fccb90,#d57eeb); }
/* Phase 2 */
#p2-panel { display:none; flex-direction:column; align-items:center; gap:10px; width:min(92vw,460px); z-index:10; position:relative; }
#p2-illus-wrap { border-radius:20px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.12); }
#p2-illus-wrap svg { display:block; border-radius:16px; }
#p2-listen-btn {
  font-family:'Fredoka One',cursive; font-size:1.05rem;
  border:none; border-radius:50px; padding:0.65rem 1.8rem;
  cursor:pointer; background:#7b5ea7; color:#fff;
  box-shadow:0 5px 0 #4a3570; transition:transform .15s;
  animation:pulseGlow 2s ease infinite;
}
@keyframes pulseGlow {
  0%,100%{box-shadow:0 5px 0 #4a3570,0 0 0 0 rgba(123,94,167,.4)}
  50%{box-shadow:0 5px 0 #4a3570,0 0 0 8px rgba(123,94,167,0)}
}
#p2-listen-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #4a3570}
#p2-hint { font-size:1rem; color:#bbb; font-weight:900; letter-spacing:4px; margin-top:-4px; }
#p2-input-wrap { display:flex; gap:8px; align-items:center; width:100%; }
#p2-input {
  flex:1; font-family:'Nunito',sans-serif; font-size:1.15rem; font-weight:900;
  border:3px solid #c8b0e8; border-radius:16px; padding:10px 14px;
  outline:none; background:white; letter-spacing:2px; transition:border-color .2s;
}
#p2-input:focus{border-color:#7b5ea7}
#p2-input.correct{border-color:#4ecdc4;background:#f4fffd}
#p2-input.wrong{border-color:#ff6b6b;background:#fff5f5;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#p2-score { font-size:0.95rem;color:#7b5ea7;font-weight:900;background:white;padding:6px 12px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08); }
#p2-check-btn {
  font-family:'Fredoka One',cursive; font-size:1rem; border:none;
  border-radius:14px; padding:10px 16px; cursor:pointer;
  background:#4ecdc4; color:#fff; box-shadow:0 4px 0 #2bab9e; transition:transform .15s;
}
#p2-check-btn:active{transform:translateY(2px)}
#p2-reveal {
  display:none; flex-direction:column; align-items:center; gap:5px;
  padding:12px 18px; border-radius:18px;
  background:white; box-shadow:0 6px 20px rgba(0,0,0,.1);
  width:100%; text-align:center;
}
.reveal-word { font-family:'Fredoka One',cursive; font-size:clamp(1.5rem,5vw,2.2rem); color:#7b5ea7; }
.reveal-phonetic { font-size:0.95rem; color:#999; font-style:italic; font-weight:700; }
.reveal-feedback { font-size:0.95rem; font-weight:900; }
.fb-correct{color:#4ecdc4} .fb-wrong{color:#ff6b6b}
/* Controls */
#controls { display:flex; gap:8px; align-items:center; z-index:10; position:relative; flex-wrap:wrap; justify-content:center; margin-top:4px; }
button.ctrl {
  font-family:'Fredoka One',cursive; font-size:0.92rem; border:none;
  border-radius:50px; padding:0.58rem 1.2rem; cursor:pointer;
  transition:transform .15s,box-shadow .15s; box-shadow:0 4px 0 rgba(0,0,0,.15);
}
button.ctrl:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15)}
.btn-shuffle{background:#ffd166;color:#333}
.btn-listen{background:#fff;color:#ff6b6b;border:3px solid #ff6b6b !important}
.btn-listen.speaking{background:#ff6b6b;color:#fff}
.btn-next{background:#ff6b6b;color:#fff}
.btn-auto{background:#4ecdc4;color:#fff}
#bottom-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; z-index:10; position:relative; margin-top:6px; }
#speed-wrap { display:flex; align-items:center; gap:6px; font-weight:700; font-size:0.82rem; color:#888; }
#speed-wrap input[type=range]{accent-color:#ff6b6b;cursor:pointer}
#tts-wrap { display:flex; align-items:center; gap:6px; font-weight:700; font-size:0.82rem; color:#888; }
#tts-toggle { width:40px;height:22px;background:#ccc;border-radius:11px;position:relative;cursor:pointer;transition:background .3s;border:none;padding:0;box-shadow:none; }
#tts-toggle::after { content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .3s; }
#tts-toggle.on{background:#4ecdc4}
#tts-toggle.on::after{left:20px}
/* Done overlay */
#done-overlay { display:none;position:fixed;inset:0;background:rgba(255,249,240,.95);z-index:100;flex-direction:column;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;text-align:center;gap:12px; }
#done-overlay.show{display:flex}
#done-overlay h2{font-size:2.6rem;color:#ff6b6b;text-shadow:3px 3px 0 #ffd166}
#done-overlay p{font-size:1.1rem;color:#888;font-family:'Nunito',sans-serif}
#done-detail { width:min(90vw,560px);max-height:36vh;overflow:auto;background:white;border-radius:8px;padding:12px 14px;box-shadow:0 6px 20px rgba(0,0,0,.1);font-family:'Nunito',sans-serif;text-align:left;color:#666;line-height:1.45; }
#done-detail:empty{display:none}
.result-section{margin-bottom:10px}
.result-section:last-child{margin-bottom:0}
.result-title{font-weight:900;color:#7b5ea7;margin-bottom:4px}
.result-list{font-size:0.95rem}
#btn-restart,#btn-review-wrong{font-family:'Fredoka One',cursive;font-size:1.1rem;border:none;border-radius:50px;padding:0.7rem 2rem;cursor:pointer;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18)}
#btn-restart{background:#ff6b6b}
#btn-review-wrong{display:none;background:#7b5ea7}
</style>
</head>
<body>

<div id="done-overlay">
  <h2>🎉 Well done!</h2>
  <p id="done-msg">All 30 words completed!</p>
  <div id="done-detail"></div>
  <button id="btn-review-wrong" onclick="reviewWrongWords()">Review Wrong Words 🔁</button>
  <button id="btn-restart" onclick="restart()">Play Again 🔄</button>
</div>

<div id="main-title">⚡ Flash Cards</div>

<div id="phase-selector">
  <button class="phase-btn p1 active" onclick="setPhase(1)">① Learn</button>
  <button class="phase-btn p2"        onclick="setPhase(2)">② Spell</button>
</div>

<div id="progress-track"><div id="progress-bar"></div></div>
<div id="counter">1 / 30</div>

<!-- Phase 1 card -->
<div id="stage">
  <div id="card">
    <div class="card-face" id="card-face">
      <div class="card-illus"    id="card-illus"></div>
      <div class="card-word"     id="card-word"></div>
      <div class="card-phonetic" id="card-phonetic"></div>
      <div class="card-category" id="card-cat"></div>
      <div class="sound-wave" id="sound-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>
</div>

<!-- Phase 2 spell panel -->
<div id="p2-panel">
  <div id="p2-illus-wrap"></div>
  <button id="p2-listen-btn" onclick="speakCurrent()">🔊 Listen again</button>
  <div id="p2-score">Correct: 0 · Wrong: 0</div>
  <div id="p2-hint"></div>
  <div id="p2-input-wrap">
    <input id="p2-input" type="text" placeholder="Type the word…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="p2-check-btn" onclick="checkSpelling()">✓ Check</button>
  </div>
  <div id="p2-reveal">
    <div class="reveal-word"     id="reveal-word"></div>
    <div class="reveal-phonetic" id="reveal-phonetic"></div>
    <div class="reveal-feedback" id="reveal-feedback"></div>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl btn-shuffle" onclick="shuffleAndRestart()">🔀 Shuffle</button>
  <button class="ctrl btn-listen"  id="btn-speak" onclick="speakCurrent()">🔊 Listen</button>
  <button class="ctrl btn-next"    id="btn-next"  onclick="nextCard()">Next ➡️</button>
  <button class="ctrl btn-auto"    id="btn-auto"  onclick="toggleAuto()">▶️ Auto</button>
</div>

<div id="bottom-row">
  <div id="tts-wrap">
    🔕 <button id="tts-toggle" class="on" onclick="toggleTTS()"></button> 🔊 Auto Read
  </div>
  <div id="speed-wrap">
    🐢 <input type="range" id="speed-slider" min="1" max="5" value="3"> 🚀
    <span id="speed-label">Medium</span>
  </div>
</div>

<script>
// ── SVG illustrations ──────────────────────────────────────────────────────
const W=140, H=130;

function face(o={}){
  const {
    skin='#f8d5a8', skinD='#f4c49a',
    hair='#5c3317', hair2='#6b3c1e',
    eye='#3a2010', bg='#fff8f0',
    hY=72, hRx=34, hRy=36,
    hairSVG='', extras=''
  }=o;
  return `
<rect width="${W}" height="${H}" rx="14" fill="${bg}"/>
<rect x="58" y="${hY+hRy-4}" width="24" height="18" rx="6" fill="${skinD}"/>
<ellipse cx="70" cy="${hY}" rx="${hRx}" ry="${hRy}" fill="${skin}"/>
<ellipse cx="${70-hRx-4}" cy="${hY+4}" rx="7" ry="10" fill="${skinD}"/>
<ellipse cx="${70+hRx+4}" cy="${hY+4}" rx="7" ry="10" fill="${skinD}"/>
${hairSVG}
<ellipse cx="56" cy="${hY+2}" rx="5" ry="6" fill="white"/>
<circle cx="57" cy="${hY+3}" r="3.5" fill="${eye}"/>
<circle cx="58" cy="${hY+1.5}" r="1" fill="white"/>
<ellipse cx="84" cy="${hY+2}" rx="5" ry="6" fill="white"/>
<circle cx="85" cy="${hY+3}" r="3.5" fill="${eye}"/>
<circle cx="86" cy="${hY+1.5}" r="1" fill="white"/>
<path d="M50 ${hY-7} Q56 ${hY-11} 62 ${hY-7}" stroke="${hair}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
<path d="M78 ${hY-7} Q84 ${hY-11} 90 ${hY-7}" stroke="${hair}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
<ellipse cx="70" cy="${hY+14}" rx="4" ry="3" fill="${skinD}"/>
<path d="M59 ${hY+22} Q70 ${hY+32} 81 ${hY+22}" stroke="#d4785a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
${extras}`;
}

function shortHair(h,h2,hY,hRx){
  return `<ellipse cx="70" cy="${hY-20}" rx="${hRx}" ry="20" fill="${h}"/>
<ellipse cx="70" cy="${hY-28}" rx="${hRx-6}" ry="14" fill="${h2}"/>`;
}

const IL = {
"Freckles":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  hairSVG:shortHair('#5c3317','#6b3c1e',72,34),
  extras:`<circle cx="52" cy="75" r="2" fill="#d4785a" opacity=".55"/>
<circle cx="59" cy="79" r="1.8" fill="#d4785a" opacity=".55"/>
<circle cx="46" cy="78" r="1.5" fill="#d4785a" opacity=".55"/>
<circle cx="88" cy="75" r="2" fill="#d4785a" opacity=".55"/>
<circle cx="81" cy="79" r="1.8" fill="#d4785a" opacity=".55"/>
<circle cx="94" cy="78" r="1.5" fill="#d4785a" opacity=".55"/>`
})}</svg>`,

"Dimples":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  skin:'#fad5b0', skinD:'#f0c098',
  hairSVG:shortHair('#5c3317','#6b3c1e',72,34),
  extras:`
<path d="M59 94 Q70 105 81 94" stroke="#d4785a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<circle cx="56" cy="91" r="3.5" fill="#e89a80" opacity=".65"/>
<circle cx="84" cy="91" r="3.5" fill="#e89a80" opacity=".65"/>
<path d="M53 89 Q56 93 59 89" stroke="#c87860" stroke-width="1.4" fill="none" stroke-linecap="round"/>
<path d="M81 89 Q84 93 87 89" stroke="#c87860" stroke-width="1.4" fill="none" stroke-linecap="round"/>`
})}</svg>`,

"Bangs":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  hair:'#8b4513', hair2:'#6b3410',
  hairSVG:`<ellipse cx="70" cy="52" rx="34" ry="22" fill="#8b4513"/>
<rect x="38" y="38" width="64" height="26" rx="4" fill="#8b4513"/>
<ellipse cx="70" cy="38" rx="32" ry="10" fill="#6b3410"/>`
})}</svg>`,

"Ponytail":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  skin:'#fce4d0', skinD:'#f8c9a8',
  hairSVG:`${shortHair('#5c3317','#4a2810',72,34)}
<ellipse cx="107" cy="62" rx="8" ry="20" fill="#5c3317" transform="rotate(20 107 62)"/>
<circle cx="107" cy="46" r="6" fill="#ff6b9d"/>`
})}</svg>`,

"Beard":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  hair:'#3a2010', hair2:'#2c1808',
  hairSVG:shortHair('#3a2010','#2c1808',72,34),
  extras:`<path d="M48 100 Q55 118 70 122 Q85 118 92 100 Q82 108 70 110 Q58 108 48 100Z" fill="#3a2010"/>
<path d="M52 94 Q55 104 60 100" stroke="#3a2010" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M88 94 Q85 104 80 100" stroke="#3a2010" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M56 91 Q70 97 84 91" stroke="#3a2010" stroke-width="5" fill="none" stroke-linecap="round"/>`
})}</svg>`,

"Glasses":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  hairSVG:shortHair('#5c3317','#6b3c1e',72,34),
  extras:`<rect x="43" y="65" width="22" height="16" rx="7" fill="none" stroke="#3a6fd4" stroke-width="2.5"/>
<rect x="75" y="65" width="22" height="16" rx="7" fill="none" stroke="#3a6fd4" stroke-width="2.5"/>
<line x1="65" y1="73" x2="75" y2="73" stroke="#3a6fd4" stroke-width="2"/>
<line x1="36" y1="70" x2="43" y2="71" stroke="#3a6fd4" stroke-width="2" stroke-linecap="round"/>
<line x1="97" y1="70" x2="104" y2="71" stroke="#3a6fd4" stroke-width="2" stroke-linecap="round"/>`
})}</svg>`,

"Curly Red":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  skin:'#fce4d0', skinD:'#f8c9a8',
  hairSVG:`<circle cx="70" cy="48" r="20" fill="#c0392b"/>
<circle cx="48" cy="58" r="16" fill="#c0392b"/>
<circle cx="92" cy="58" r="16" fill="#c0392b"/>
<circle cx="40" cy="74" r="12" fill="#c0392b"/>
<circle cx="100" cy="74" r="12" fill="#c0392b"/>
<circle cx="54" cy="44" r="13" fill="#e74c3c"/>
<circle cx="86" cy="44" r="13" fill="#e74c3c"/>
<circle cx="50" cy="62" r="5" fill="#ff8c78" opacity=".5"/>
<circle cx="64" cy="40" r="4" fill="#ff8c78" opacity=".5"/>`,
  extras:`<circle cx="52" cy="77" r="1.8" fill="#d4785a" opacity=".5"/>
<circle cx="59" cy="81" r="1.6" fill="#d4785a" opacity=".5"/>
<circle cx="88" cy="77" r="1.8" fill="#d4785a" opacity=".5"/>
<circle cx="81" cy="81" r="1.6" fill="#d4785a" opacity=".5"/>`
})}</svg>`,

"Short Gray":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  skin:'#f0d4b0', skinD:'#e0c098',
  hair:'#9e9e9e', hair2:'#bdbdbd',
  hairSVG:shortHair('#9e9e9e','#bdbdbd',72,34),
  extras:`<path d="M52 80 Q56 76 60 80" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<path d="M80 80 Q84 76 88 80" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>`
})}</svg>`,

"Wavy Black":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  hairSVG:`<ellipse cx="70" cy="50" rx="36" ry="24" fill="#222"/>
<path d="M36,86 Q44,78 52,86 Q60,94 68,86" stroke="#222" stroke-width="12" fill="none" stroke-linecap="round"/>
<path d="M72,86 Q80,78 88,86 Q96,94 104,86" stroke="#222" stroke-width="12" fill="none" stroke-linecap="round"/>`
})}</svg>`,

"Straight Brown":()=>`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${face({
  skin:'#f8c8a0', skinD:'#e8b080', hair:'#7b4f2e', hair2:'#8b5e3c',
  hairSVG:`<path d="M34 48 Q40 28 70 26 Q100 28 106 48 L104 92 Q96 104 88 112 L84 78 Q78 90 70 94 Q62 90 56 78 L52 112 Q44 104 36 92 Z" fill="#7b4f2e"/>
<path d="M40 48 Q48 34 70 32 Q92 34 100 48" fill="none" stroke="#8b5e3c" stroke-width="8" stroke-linecap="round"/>
<line x1="50" y1="42" x2="50" y2="108" stroke="#9a6a43" stroke-width="2" stroke-linecap="round" opacity=".55"/>

// ── State ──────────────────────────────────────────────────────────────────
let deck=[],idx=0,autoTimer=null,isAuto=false,autoRead=true,ttsVoice=null,phase=1,p2Revealed=false,p2Reviewing=false;
let p2Results={correct:[],wrong:[]};
const speeds={1:4000,2:2500,3:1500,4:900,5:500};
const speedLabels={1:"Slow",2:"Easy",3:"Medium",4:"Fast",5:"⚡ Flash"};

// ── TTS ────────────────────────────────────────────────────────────────────
function loadVoices(){
  const vs=speechSynthesis.getVoices();
  const preferredNames=[
    'Google US English',
    'Microsoft Aria Online',
    'Microsoft Jenny Online',
    'Samantha',
    'Alex',
    'Daniel'
  ];
  const noveltyNames=[
    'Albert','Bad News','Bahh','Bells','Boing','Bubbles','Cellos','Deranged',
    'Good News','Hysterical','Jester','Organ','Ralph','Trinoids','Whisper','Zarvox'
  ];
  const isStandardVoice=v=>!noveltyNames.some(name=>v.name.toLowerCase().includes(name.toLowerCase()));
  ttsVoice=preferredNames.map(name=>vs.find(v=>v.lang.startsWith('en')&&v.name.includes(name))).find(Boolean)
    ||vs.find(v=>v.lang==='en-US'&&isStandardVoice(v)&&v.localService)
    ||vs.find(v=>v.lang.startsWith('en')&&isStandardVoice(v)&&v.localService)
    ||vs.find(v=>v.lang==='en-US'&&isStandardVoice(v))
    ||vs.find(v=>v.lang.startsWith('en')&&isStandardVoice(v))
    ||vs.find(v=>v.lang.startsWith('en'))
    ||vs[0]
    ||null;
}
speechSynthesis.onvoiceschanged=loadVoices; loadVoices();

function speak(text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=0.92;utt.pitch=1;
  if(ttsVoice)utt.voice=ttsVoice;
  const wave=document.getElementById('sound-wave');
  const btn=document.getElementById('btn-speak');
  const p2b=document.getElementById('p2-listen-btn');
  wave&&wave.classList.add('active');
  btn&&btn.classList.add('speaking');
  p2b&&p2b.classList.add('speaking');
  utt.onend=utt.onerror=()=>{
    wave&&wave.classList.remove('active');
    btn&&btn.classList.remove('speaking');
    p2b&&p2b.classList.remove('speaking');
  };
  speechSynthesis.speak(utt);
}
function speakCurrent(){const item=deck[idx];if(item)speak(item.word);}
function toggleTTS(){autoRead=!autoRead;document.getElementById('tts-toggle').classList.toggle('on',autoRead);}

// ── Phase ──────────────────────────────────────────────────────────────────
function setPhase(p){
  phase=p;
  document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i===p-1));
  const stage=document.getElementById('stage');
  const p2panel=document.getElementById('p2-panel');
  const btnAuto=document.getElementById('btn-auto');
  const btnNext=document.getElementById('btn-next');
  const bottomRow=document.getElementById('bottom-row');
  stopAuto();
  deck=shuffle([...WORDS]);idx=0;updateCounter();
  if(p===1){
    p2Reviewing=false;
    stage.style.display='';p2panel.style.display='none';
    btnAuto.style.display='';btnNext.style.display='';bottomRow.style.display='';
    showCard(true);
  } else {
    stage.style.display='none';p2panel.style.display='flex';
    btnAuto.style.display='none';btnNext.style.display='none';bottomRow.style.display='none';
    p2Reviewing=false;resetP2Results();
    loadP2Card(true);
  }
}

// ── Phase 1 ────────────────────────────────────────────────────────────────
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function init(){deck=shuffle([...WORDS]);idx=0;showCard(true);}
function updateCounter(){
  document.getElementById('counter').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('progress-bar').style.width=((idx+1)/deck.length*100).toFixed(1)+'%';
}
function showCard(instant){
  const item=deck[idx];updateCounter();
  if(instant){applyCard(item);if(autoRead)setTimeout(()=>speak(item.word),300);return;}
  const card=document.getElementById('card');
  card.classList.add('flipping');
  setTimeout(()=>{applyCard(item);card.classList.remove('flipping');if(autoRead)setTimeout(()=>speak(item.word),180);},300);
}
function applyCard(item){
  document.getElementById('card-face').className='card-face '+item.theme;
  const fn=IL[item.word];
  document.getElementById('card-illus').innerHTML=fn?fn():'';
  document.getElementById('card-word').textContent=item.word;
  document.getElementById('card-phonetic').textContent=item.phonetic;
  document.getElementById('card-cat').textContent=item.cat;
}
function nextCard(){if(idx>=deck.length-1){showDone();return;}idx++;showCard(false);}
function showDone(){
  stopAuto();
  document.getElementById('done-detail').replaceChildren();
  document.getElementById('btn-review-wrong').style.display='none';
  if(phase===2)showP2Results();
  else document.getElementById('done-msg').textContent='All 30 words completed!';
  document.getElementById('done-overlay').classList.add('show');
}
function restart(){
  document.getElementById('done-overlay').classList.remove('show');
  if(phase===1)init();else{p2Reviewing=false;deck=shuffle([...WORDS]);idx=0;resetP2Results();loadP2Card(true);}
}
function shuffleAndRestart(){
  stopAuto();document.getElementById('done-overlay').classList.remove('show');
  deck=shuffle([...WORDS]);idx=0;
  if(phase===1)showCard(true);else{p2Reviewing=false;resetP2Results();loadP2Card(true);}
}
function toggleAuto(){if(isAuto)stopAuto();else startAuto();}
function startAuto(){
  isAuto=true;document.getElementById('btn-auto').textContent='⏹ Stop';
  const ms=speeds[document.getElementById('speed-slider').value];
  autoTimer=setInterval(()=>{if(idx>=deck.length-1){stopAuto();showDone();return;}idx++;showCard(false);},ms);
}
function stopAuto(){isAuto=false;clearInterval(autoTimer);const b=document.getElementById('btn-auto');if(b)b.textContent='▶️ Auto';}

// ── Phase 2 ────────────────────────────────────────────────────────────────
function resetP2Results(){
  p2Results={correct:[],wrong:[]};
  updateP2Score();
}
function updateP2Score(){
  const el=document.getElementById('p2-score');
  if(!el)return;
  const label=p2Reviewing?'Review':'Score';
  el.textContent=`${label}: ${p2Results.correct.length} correct · ${p2Results.wrong.length} wrong`;
}
function recordP2Answer(item,typed,ok){
  const entry={item,typed};
  if(ok)p2Results.correct.push(entry);else p2Results.wrong.push(entry);
  updateP2Score();
}
function addResultSection(detail,title,entries,showTyped){
  const section=document.createElement('div');
  section.className='result-section';
  const sectionTitle=document.createElement('div');
  sectionTitle.className='result-title';
  sectionTitle.textContent=title;
  const list=document.createElement('div');
  list.className='result-list';
  list.textContent=entries.length
    ? entries.map(({item,typed})=>showTyped&&typed?`${item.word} (you typed: ${typed})`:item.word).join(', ')
    : 'None';
  section.append(sectionTitle,list);
  detail.append(section);
}
function showP2Results(){
  const total=p2Results.correct.length+p2Results.wrong.length;
  const score=`Score: ${p2Results.correct.length} / ${total}`;
  document.getElementById('done-msg').textContent=p2Reviewing
    ? `Wrong-word review complete. ${score}`
    : `Spell practice complete. ${score}`;
  const detail=document.getElementById('done-detail');
  addResultSection(detail,`Correct (${p2Results.correct.length})`,p2Results.correct,false);
  addResultSection(detail,`Wrong (${p2Results.wrong.length})`,p2Results.wrong,true);
  const reviewBtn=document.getElementById('btn-review-wrong');
  reviewBtn.style.display=p2Results.wrong.length&&!p2Reviewing?'inline-block':'none';
}
function reviewWrongWords(){
  if(!p2Results.wrong.length)return;
  const wrongItems=p2Results.wrong.map(({item})=>item);
  document.getElementById('done-overlay').classList.remove('show');
  p2Reviewing=true;deck=shuffle([...wrongItems]);idx=0;resetP2Results();loadP2Card(true);
}
function loadP2Card(instant){
  const item=deck[idx];updateCounter();p2Revealed=false;
  updateP2Score();
  const input=document.getElementById('p2-input');
  const reveal=document.getElementById('p2-reveal');
  input.value='';input.className='';input.disabled=false;
  reveal.style.display='none';
  document.getElementById('p2-check-btn').textContent='✓ Check';
  // show illustration in phase 2 too
  const fn=IL[item.word];
  document.getElementById('p2-illus-wrap').innerHTML=fn?fn():'';
  // hint: underscores per word part
  document.getElementById('p2-hint').textContent=item.word.split(' ').map(p=>'_'.repeat(p.length)).join('  ');
  if(autoRead||instant)setTimeout(()=>speak(item.word),instant?500:100);
  setTimeout(()=>input.focus(),100);
}
function checkSpelling(){
  if(p2Revealed){nextP2();return;}
  const item=deck[idx];
  const input=document.getElementById('p2-input');
  const typed=input.value.trim();
  const ok=typed.toLowerCase()===item.word.toLowerCase();
  recordP2Answer(item,typed,ok);
  input.className=ok?'correct':'wrong';
  if(!ok){input.style.animation='none';input.offsetHeight;input.style.animation='';}
  const reveal=document.getElementById('p2-reveal');
  document.getElementById('reveal-word').textContent=item.word;
  document.getElementById('reveal-phonetic').textContent=item.phonetic;
  const fb=document.getElementById('reveal-feedback');
  fb.textContent=ok?'✓ Correct!':'✗  The answer is above';
  fb.className='reveal-feedback '+(ok?'fb-correct':'fb-wrong');
  reveal.style.display='flex';
  input.disabled=true;p2Revealed=true;
  document.getElementById('p2-check-btn').textContent=idx>=deck.length-1?'Show Score 🏁':'Next ➡️';
  speak(item.word);
}
function nextP2(){
  if(idx>=deck.length-1){showDone();return;}
  idx++;document.getElementById('p2-check-btn').textContent='✓ Check';
  loadP2Card(false);
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('speed-slider').addEventListener('input',function(){
  document.getElementById('speed-label').textContent=speedLabels[this.value];
  if(isAuto){stopAuto();startAuto();}
});
document.getElementById('card').addEventListener('click',()=>{if(phase===1)nextCard();});
document.getElementById('p2-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkSpelling();});
document.addEventListener('keydown',e=>{
  if(phase===1){
    if(e.key==='ArrowRight'||e.key===' ')nextCard();
    if(e.key==='ArrowLeft'&&idx>0){idx--;showCard(false);}
  }
});

// bubbles
const bC=['#ff6b6b','#ffd166','#4ecdc4','#a18cd1','#84fab0'];
for(let i=0;i<16;i++){
  const b=document.createElement('div');b.className='bubble';
  const s=40+Math.random()*100;
  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;background:${bC[i%5]};animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*20}s;`;
  document.body.appendChild(b);
}

init();
</script>
</body>
</html>
